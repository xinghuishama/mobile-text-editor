name: Flutter Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: Backup core files
        run: |
          mkdir -p /tmp/backup
          cp -r lib assets pubspec.yaml /tmp/backup/
          cp -r tools /tmp/backup/ 2>/dev/null || true
          # 备份自定义应用图标（CI 重建工程后恢复，防止被默认图标覆盖）
          mkdir -p /tmp/backup/android_res
          cp -r android/app/src/main/res/* /tmp/backup/android_res/ 2>/dev/null || true
          mkdir -p /tmp/backup/ios_icons
          cp -r ios/Runner/Assets.xcassets/* /tmp/backup/ios_icons/ 2>/dev/null || true

      - name: Clean directory (keep .git)
        run: |
          find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} +

      - name: Create fresh Flutter project
        run: flutter create . --project-name mobile_text_editor

      - name: Restore our code
        run: |
          cp -r /tmp/backup/lib .
          cp -r /tmp/backup/assets .
          cp /tmp/backup/pubspec.yaml .
          cp -r /tmp/backup/tools . 2>/dev/null || true
          # 恢复自定义应用图标
          mkdir -p android/app/src/main/res
          cp -r /tmp/backup/android_res/* android/app/src/main/res/ 2>/dev/null || true
          mkdir -p ios/Runner/Assets.xcassets
          cp -r /tmp/backup/ios_icons/* ios/Runner/Assets.xcassets/ 2>/dev/null || true

      - name: Apply Android patch (打开方式 intent-filter + MainActivity)
        run: python3 tools/patch_android.py

      - name: Install dependencies
        run: flutter pub get

      - name: Set NDK version
        run: |
          cd android/app
          if [ -f build.gradle ]; then
            sed -i '/android {/a\        ndkVersion = "27.0.12077973"' build.gradle
          elif [ -f build.gradle.kts ]; then
            sed -i '/android {/a\    ndkVersion = "27.0.12077973"' build.gradle.kts
          fi

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

name: Flutter Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      # 1. 备份我们自己的核心代码（不要备份 android/ 等平台目录）
      - name: Backup core files
        run: |
          mkdir -p /tmp/backup
          cp -r lib assets pubspec.yaml /tmp/backup/

      # 2. 删除所有文件（包括 android/），但保留 .git
      - name: Clean directory (keep .git)
        run: |
          find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} +

      # 3. 创建全新的 Flutter 项目（生成完整的 android/ 结构）
      - name: Create fresh Flutter project
        run: flutter create . --project-name mobile_text_editor

      # 4. 只恢复我们的 lib/、assets/、pubspec.yaml（不覆盖 android/）
      - name: Restore our code
        run: |
          cp -r /tmp/backup/lib .
          cp -r /tmp/backup/assets .
          cp /tmp/backup/pubspec.yaml .

      # 5. 设置 NDK 版本
      - name: Set NDK version
        run: |
          if [ -f android/app/build.gradle ]; then
            sed -i '/android {/a\        ndkVersion = "27.0.12077973"' android/app/build.gradle
          elif [ -f android/app/build.gradle.kts ]; then
            sed -i '/android {/a\    ndkVersion = "27.0.12077973"' android/app/build.gradle.kts
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

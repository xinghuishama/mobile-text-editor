name: Flutter Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: Backup core files
        run: |
          mkdir -p /tmp/backup
          cp -r lib assets pubspec.yaml /tmp/backup/

      - name: Clean directory (keep .git)
        run: |
          find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} +

      - name: Create fresh Flutter project
        run: flutter create . --project-name mobile_text_editor

      - name: Restore our code
        run: cp -r /tmp/backup/* .

      - name: Set NDK version to 27.0.12077973
        run: |
          if [ -f android/app/build.gradle ]; then
            sed -i '/android {/a\        ndkVersion = "27.0.12077973"' android/app/build.gradle
          elif [ -f android/app/build.gradle.kts ]; then
            sed -i '/android {/a\    ndkVersion = "27.0.12077973"' android/app/build.gradle.kts
          fi
          # 备用方案：直接追加到文件末尾（如果上述方法无效）
          echo 'android.ndkVersion = "27.0.12077973"' >> android/app/build.gradle 2>/dev/null || echo 'android.ndkVersion = "27.0.12077973"' >> android/app/build.gradle.kts 2>/dev/null || true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/


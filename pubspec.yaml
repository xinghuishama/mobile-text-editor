name: mobile_text_editor
description: A professional mobile text editor with syntax highlighting.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.4.5
  provider: ^6.1.1
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  file_picker: ^6.2.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.18.1
  gbk: ^0.4.0                 # GBK 编码支持
  charset_converter: ^2.0.0   # 编码转换（支持 Big5）
  charset_detector: ^1.0.0    # 自动检测编码

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/editor/
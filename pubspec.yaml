name: mobile_text_editor
description: A professional mobile text editor
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  file_picker: ^8.1.2
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.3.0
  charset_converter: ^2.2.0
  path: ^1.9.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/editor/

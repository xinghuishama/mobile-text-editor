name: mobile_text_editor
description: A professional mobile text editor with syntax highlighting.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.10.0
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  file_picker: ^8.1.2
  charset: ^2.0.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/editor/
